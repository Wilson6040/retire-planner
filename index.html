    <style>
      :root {
        --bg: #0a0f1e;
        --panel: #11172a;
        --panel-2: #17213b;
        --text: #ffffff;
        --muted: #9fb0d0;
        --line: #253150;
      }
      [data-theme='light'] {
        --bg: #f2f5fb;
        --panel: #ffffff;
        --panel-2: #edf2fb;
        --text: #0b1328;
        --muted: #475a84;
        --line: #d5def2;
      }
      body {
        background: radial-gradient(circle at top right, #17213b 0%, var(--bg) 42%);
        color: var(--text);
        min-height: 100vh;
      }
      [data-theme='light'] body {
        background: linear-gradient(180deg, #f9fbff 0%, #e9f0fb 100%);
      }
      .panel {
        background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
        border: 1px solid var(--line);
      }
      .field,
      .btn,
      .select,
      .textarea {
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--text);
      }
      .muted {
        color: var(--muted);
      }
      .timeline-line {
        background: linear-gradient(90deg, #22c55e 0%, #f59e0b 50%, #ef4444 100%);
      }
      /* Vertical milestone timeline */
      .vtl-container { position: relative; padding: 0 0 40px 0; }
      .vtl-spine {
        position: absolute;
        left: 50%;
        top: 0; bottom: 0;
        width: 3px;
        transform: translateX(-50%);
        background: linear-gradient(180deg, #22c55e 0%, #f59e0b 60%, #ef4444 100%);
        border-radius: 2px;
      }
      .vtl-item {
        display: flex;
        justify-content: flex-end;
        padding-right: calc(50% + 28px);
        margin-bottom: 40px;
        opacity: 0;
        transform: translateX(-40px);
        animation: slideInLeft 0.5s ease forwards;
      }
      .vtl-item.right {
        justify-content: flex-start;
        padding-right: 0;
        padding-left: calc(50% + 28px);
        transform: translateX(40px);
        animation-name: slideInRight;
      }
      .vtl-dot {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 18px; height: 18px;
        border-radius: 50%;
        border: 3px solid var(--bg);
        z-index: 2;
        box-shadow: 0 0 10px rgba(255,255,255,0.2);
      }
      .vtl-card {
        background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 18px;
        max-width: 340px;
        width: 100%;
        position: relative;
      }
      .vtl-card::after {
        content: '';
        position: absolute;
        top: 18px;
        width: 0; height: 0;
        border-top: 8px solid transparent;
        border-bottom: 8px solid transparent;
      }
      .vtl-item:not(.right) .vtl-card::after {
        right: -8px;
        border-left: 9px solid var(--line);
      }
      .vtl-item.right .vtl-card::after {
        left: -8px;
        border-right: 9px solid var(--line);
      }
      @keyframes slideInLeft {
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInRight {
        to { opacity: 1; transform: translateX(0); }
      }
      .vtl-item:nth-child(1) { animation-delay: 0.05s; }
      .vtl-item:nth-child(2) { animation-delay: 0.18s; }
      .vtl-item:nth-child(3) { animation-delay: 0.31s; }
      .vtl-item:nth-child(4) { animation-delay: 0.44s; }
      .vtl-item:nth-child(5) { animation-delay: 0.57s; }
      .vtl-item:nth-child(6) { animation-delay: 0.70s; }
      .vtl-item:nth-child(7) { animation-delay: 0.83s; }
      .vtl-item:nth-child(8) { animation-delay: 0.96s; }
      @media (max-width: 640px) {
        .vtl-spine { left: 20px; }
        .vtl-item, .vtl-item.right { justify-content: flex-start; padding-left: 52px; padding-right: 0; transform: translateX(20px); animation-name: slideInRight; }
        .vtl-dot { left: 20px; }
        .vtl-card { max-width: 100%; }
        .vtl-item:not(.right) .vtl-card::after { display: none; }
        .vtl-item.right .vtl-card::after { display: none; }
      }
      @media print {
        .no-print {
          display: none !important;
        }
        .print-break {
          page-break-before: always;
        }
        body {
          background: #fff !important;
          color: #000 !important;
        }
        .panel {
          border: 1px solid #bbb;
          background: #fff;
        }
      }
    </style>

    <script>
      (function() {
        // SHA-256 hash of the password (never store plaintext)
        // Current hash = SHA-256 of "retireplan2026"
        var HASH = 'e8469f09623c01bde9cf7587d7ab6350a292e8a968f7d3a7c42af02e42acd60e';
        async function sha256(str) {
          const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
          return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        }
        var TTL = 24 * 60 * 60 * 1000; // 24 hours in ms
        function isAuthed() {
          var exp = localStorage.getItem('rp_auth_exp');
          return exp && Date.now() < Number(exp);
        }
        window.checkGate = async function() {
          var val = document.getElementById('gate-input').value;
          var h = await sha256(val);
          if (h === HASH) {
            localStorage.setItem('rp_auth_exp', Date.now() + TTL);
            document.getElementById('gate').style.display = 'none';
          } else {
            document.getElementById('gate-error').textContent = 'Incorrect password.';
            document.getElementById('gate-input').value = '';
            document.getElementById('gate-input').focus();
          }
        };
        if (isAuthed()) {
          document.getElementById('gate').style.display = 'none';
        } else {
          document.getElementById('gate').style.display = 'flex';
        }
      })();
    </script>

      function usePersistentState(key, initialValue) {
        const [value, setValue] = React.useState(() => {
          try {
            const stored = localStorage.getItem(key);
            return stored ? JSON.parse(stored) : initialValue;
          } catch {
            return initialValue;
          }
        });

        React.useEffect(() => {
          localStorage.setItem(key, JSON.stringify(value));
        }, [key, value]);

        return [value, setValue];
      }

      function sum(arr, key) {
        return arr.reduce((acc, x) => acc + (key ? Number(x[key] || 0) : Number(x || 0)), 0);
      }

      function quantile(sorted, q) {
        if (!sorted.length) return 0;
        const pos = (sorted.length - 1) * q;
        const base = Math.floor(pos);
        const rest = pos - base;
        if (sorted[base + 1] !== undefined) {
          return sorted[base] + rest * (sorted[base + 1] - sorted[base]);
        }
        return sorted[base];
      }

      function normalRandom(mean = 0, stdDev = 1) {
        let u = 0,
          v = 0;
        while (u === 0) u = Math.random();
        while (v === 0) v = Math.random();
        const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        return mean + z * stdDev;
      }

      function fmtMoney(value, currency = 'GBP', digits = 0) {
        return new Intl.NumberFormat('en-GB', {
          style: 'currency',
          currency,
          maximumFractionDigits: digits,
        }).format(Number(value || 0));

        return sum(plan.accounts, 'value') + sum(plan.hypotheticals.filter((h) => h.enabled), 'startValue') + Number(scenario?.extraAssetDelta || 0);

      function ageToYear(currentAge, targetAge) {
        return CURRENT_YEAR + (targetAge - currentAge);

        return plan.expenses.oneOffs.reduce((acc, x) => {
          const y = new Date(x.date).getFullYear();
          acc[y] = (acc[y] || 0) + Number(x.amount || 0);
          return acc;
        }, {});

        const rows = [];
        for (let age = currentAge; age <= maxAge; age += 1) {
          const year = ageToYear(currentAge, age);
          const yearsFromNow = age - currentAge;
          const inflationFactor = Math.pow(1 + inflation, yearsFromNow);
          const incomeMap = {};
          let income = 0;
          plan.incomeStreams.forEach((s) => {
            const active = age >= Number(s.startAge) && age <= Number(s.endAge);
            const annual = active ? Number(s.monthly) * 12 : 0;
            incomeMap[s.name] = annual;
            income += annual;
          });

          if (scenario.lumpSumAge && Number(scenario.lumpSumAge) === age) {
            income += Number(scenario.lumpSumAmount || 0);
            incomeMap['Scenario Lump Sum'] = Number(scenario.lumpSumAmount || 0);
          }

          const annualExpense = (baseDrawdownAnnual + baseCategoryAnnual) * inflationFactor + Number(oneOffByYear[year] || 0);
          const start = portfolio;
          portfolio = Math.max(0, portfolio * (1 + expectedReturn) + income - annualExpense);
          const drawdown = Math.max(0, annualExpense - income);
          const drawdownRate = start > 0 ? (drawdown / start) * 100 : 0;

          rows.push({
            age,
            year,
            income,
            annualExpense,
            net: income - annualExpense,
            portfolio,
            drawdownRate,
            ...incomeMap,
          });
        }
        return rows;
      }

      function runwayAge(rows, lifeExpectancy) {
        const broke = rows.find((r) => r.portfolio <= 0.01);
        return broke ? broke.age : lifeExpectancy;
      }

      function runwayColor(age) {
        if (age >= 90) return 'text-positive';
        if (age >= 85) return 'text-amberish';
        return 'text-negative';
      }

      function monteCarlo(plan, scenario, simulations = 1000) {
        const currentAge = Number(plan.people.stuart.age);
        const maxAge = Number(plan.people.lifeExpectancy);
        const years = Math.max(1, Math.min(Number(plan.assumptions.yearsToSimulate || 1), maxAge - currentAge + 1));
        const inflation = (Number(plan.assumptions.inflation) + Number(scenario.saInflationAdj || 0)) / 100;
        const mean = (Number(plan.assumptions.expectedReturn) + Number(scenario.returnAdj || 0)) / 100;
        const std = Number(plan.assumptions.volatility) / 100;
        const baseDrawdownAnnual = Number(plan.expenses.monthlyDrawdown) * 12 * (1 + Number(scenario.expenseAdjPct || 0) / 100);
        const baseCategoryAnnual = sum(plan.expenses.categories, 'monthly') * 12 * (1 + Number(scenario.expenseAdjPct || 0) / 100);
        const oneOffByYear = getOneOffByYear(plan);
        const trajectories = Array.from({ length: years }, () => []);
        let success = 0;

        for (let s = 0; s < simulations; s += 1) {
          let portfolio = startPortfolio(plan, scenario);
          for (let idx = 0; idx < years; idx += 1) {
            const age = currentAge + idx;
            const year = ageToYear(currentAge, age);
            let income = 0;
            plan.incomeStreams.forEach((stream) => {
              if (age >= Number(stream.startAge) && age <= Number(stream.endAge)) income += Number(stream.monthly) * 12;
            });
            if (scenario.lumpSumAge && Number(scenario.lumpSumAge) === age) income += Number(scenario.lumpSumAmount || 0);

            const expense = (baseDrawdownAnnual + baseCategoryAnnual) * Math.pow(1 + inflation, idx) + Number(oneOffByYear[year] || 0);
            const annualReturn = normalRandom(mean, std);
            portfolio = Math.max(0, portfolio * (1 + annualReturn) + income - expense);
            trajectories[idx].push(portfolio);
          }
          if (portfolio > 0) success += 1;
        }

        const fan = trajectories.map((arr, idx) => {
          const sorted = [...arr].sort((a, b) => a - b);
          return {
            age: currentAge + idx,
            p10: quantile(sorted, 0.1),
            p25: quantile(sorted, 0.25),
            p50: quantile(sorted, 0.5),
            p75: quantile(sorted, 0.75),
            p90: quantile(sorted, 0.9),
          };
        });

        return {
          successProbability: (success / simulations) * 100,
          fan,
        };
      }

      // Per-asset Monte Carlo — uses cagrByYear, falls back to last year for years > 10
      function monteCarloAssets(plan, simulations = 500) {
        const currentAge = Number(plan.people.stuart.age);
        const maxAge = Number(plan.people.lifeExpectancy);
        const years = maxAge - currentAge;
        const inflation = Number(plan.assumptions.inflation || 5) / 100;
        const volatility = Number(plan.assumptions.volatility || 10) / 100;
        const assets = [...(plan.isaPortfolio || []), ...(plan.pensionPortfolio || [])];
        const baseDrawdown = (Number(plan.expenses.monthlyDrawdown) * 12);

        function assetCagr(asset, yearIdx) {
          const c = asset.cagrByYear || [];
          const raw = c[Math.min(yearIdx, c.length - 1)] ?? 7;
          return Number(raw) / 100;
        }

        // Simulate each asset independently
        const assetResults = assets.map((asset, ai) => {
          const trajectories = Array.from({ length: years }, () => []);
          for (let s = 0; s < simulations; s++) {
            let val = Number(asset.value || 0);
            for (let y = 0; y < years; y++) {
              const mean = assetCagr(asset, y);
              const shock = normalRandom(mean, volatility);
              val = Math.max(0, val * (1 + shock));
              trajectories[y].push(val);
            }
          }
          return {
            id: asset.id,
            name: asset.name,
            color: PA_COLORS[ai % 10],
            fan: trajectories.map((arr, y) => {
              const sorted = [...arr].sort((a, b) => a - b);
              return {
                age: currentAge + y + 1,
                p10: quantile(sorted, 0.1),
                p25: quantile(sorted, 0.25),
                p50: quantile(sorted, 0.5),
                p75: quantile(sorted, 0.75),
                p90: quantile(sorted, 0.9),
              };
            }),
          };
        });

        // Combined portfolio simulation
        const combinedTraj = Array.from({ length: years }, () => []);
        let success = 0;
        for (let s = 0; s < simulations; s++) {
          let assetVals = assets.map(a => Number(a.value || 0));
          for (let y = 0; y < years; y++) {
            assetVals = assetVals.map((val, ai) => {
              const mean = assetCagr(assets[ai], y);
              return Math.max(0, val * (1 + normalRandom(mean, volatility)));
            });
            const total = assetVals.reduce((a, b) => a + b, 0);
            // Deduct inflation-adjusted drawdown
            const drawdown = baseDrawdown * Math.pow(1 + inflation, y);
            const net = Math.max(0, total - drawdown);
            combinedTraj[y].push(net);
            if (y === years - 1 && net > 0) success++;
          }
        }

        const combinedFan = combinedTraj.map((arr, y) => {
          const sorted = [...arr].sort((a, b) => a - b);
          return {
            age: currentAge + y + 1,
            p10: quantile(sorted, 0.1),
            p25: quantile(sorted, 0.25),
            p50: quantile(sorted, 0.5),
            p75: quantile(sorted, 0.75),
            p90: quantile(sorted, 0.9),
          };
        });

        return {
          assetResults,
          combinedFan,
          successProbability: (success / simulations) * 100,
        };
      }

      function taxFromSABands(annualTaxableGBP, gbpZar) {
        const taxableZar = annualTaxableGBP * gbpZar;
        const bands = [
          { max: 237100, rate: 0.18 },
          { max: 370500, rate: 0.26 },
          { max: 512800, rate: 0.31 },
          { max: 673000, rate: 0.36 },
          { max: 857900, rate: 0.39 },
          { max: 1817000, rate: 0.41 },
          { max: Infinity, rate: 0.45 },
        ];
        let remaining = taxableZar;
        let prev = 0;
        let tax = 0;
        for (const b of bands) {
          const chunk = Math.min(remaining, b.max - prev);
          if (chunk <= 0) break;
          tax += chunk * b.rate;
          remaining -= chunk;
          prev = b.max;
        }
        return { taxableZar, taxZar: Math.max(0, tax), taxGBP: Math.max(0, tax / gbpZar) };
      }

        const withdrawalSchedule = React.useMemo(() => {
          const currentAge = Number(plan.people.stuart.age);

          const expectedReturn = Number(plan.assumptions.expectedReturn) / 100;
          const accounts = plan.accounts.map((a) => ({ ...a, remaining: Number(a.value) }));
          const rows = [];

          for (let age = currentAge; age <= maxAge; age += 1) {
            const year = ageToYear(currentAge, age);
            accounts.forEach((a) => {
              a.remaining *= 1 + expectedReturn;
            });
            const income = sum(
              plan.incomeStreams.filter((i) => age >= Number(i.startAge) && age <= Number(i.endAge)).map((i) => Number(i.monthly) * 12)
            );
            const expenses = (Number(plan.expenses.monthlyDrawdown) + sum(plan.expenses.categories, 'monthly')) * 12 * Math.pow(1 + Number(plan.assumptions.inflation) / 100, age - currentAge);
            let need = Math.max(0, expenses - income);

            const order = age < 57 ? ['ISA', 'GIA', 'Crypto', 'SIPP'] : ['SIPP', 'ISA', 'GIA', 'Crypto'];
            const eligible = accounts
              .filter((a) => age >= Number(a.accessibleAge))
              .sort((a, b) => {
                const ia = order.indexOf(a.type);
                const ib = order.indexOf(b.type);
                return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
              });

            if (need <= 0) {
              rows.push({ age, year, source: 'No drawdown', amount: 0, remaining: sum(accounts, 'remaining') });
              continue;
            }

            for (const acc of eligible) {
              if (need <= 0) break;
              if (acc.remaining <= 0) continue;
              const draw = Math.min(acc.remaining, need);
              acc.remaining -= draw;
              need -= draw;
              rows.push({ age, year, source: acc.name, amount: draw, remaining: acc.remaining });

        function updatePlan(path, value) {

          });

        function updateRow(listKey, id, field, value) {
          setPlan((prev) => ({

        function projectAsset(asset, years = 10) {
          const vals = [Number(asset.value || 0)];
          for (let y = 0; y < years; y += 1) {
            const rate = Number((asset.cagrByYear || [])[y] ?? 7) / 100;
            vals.push(vals[vals.length - 1] * (1 + rate));
          }
          return vals;
        }

        function buildPortfolioProjectionData(assets, years = 10) {
          const projections = assets.map((asset) => projectAsset(asset, years));
          const chartData = Array.from({ length: years + 1 }, (_, y) => {

            assets.forEach((asset, i) => {
              row[asset.id] = Math.round(projections[i][y]);
            });
            row.__total = Math.round(sum(assets.map((_, i) => projections[i][y])));
            return row;
          });
          return { projections, chartData };
        }

        function updateAsset(portfolioKey, id, field, value) {

          setPlan((prev) => ({

              const cagrByYear = [...(a.cagrByYear || Array(10).fill(7))];

        const milestoneData = React.useMemo(() => {

        const timelineStart = new Date();

        const saTaxEstimate = React.useMemo(() => {
          const taxableAnnual = plan.incomeStreams.reduce((acc, i) => {
            if (!i.taxable) return acc;

            return acc + Number(i.monthly || 0);
          }, 0) * 12;
          return taxFromSABands(taxableAnnual, currencyRate);
        }, [plan, currencyRate]);

        // CGT only on crypto accounts (ISA holdings are exempt)
        const cryptoValue = React.useMemo(() =>
          sum(plan.accounts.filter(a => a.type === 'Crypto').map(a => Number(a.value || 0)))
        , [plan.accounts]);
        // Crypto CGT: assume user enters cost basis; default to 40% of current value as rough gain placeholder
        const cryptoCostBasis = React.useMemo(() =>
          sum(plan.accounts.filter(a => a.type === 'Crypto').map(a => Number(a.costBasis || Number(a.value || 0) * 0.4)))
        , [plan.accounts]);
        const cgtGains = React.useMemo(() => Math.max(0, cryptoValue - cryptoCostBasis), [cryptoValue, cryptoCostBasis]);
        const cgtTaxable = Math.max(0, cgtGains - Number(plan.tax.ukCgtAllowance || 0));

        // SIPP income tax: 25% PCLS tax-free, remainder taxed as income
        const sippValue = React.useMemo(() =>
          sum(plan.accounts.filter(a => a.type === 'SIPP').map(a => Number(a.value || 0)))
        , [plan.accounts]);
        const sippTaxFreeAmount = sippValue * 0.25;
        const sippTaxableAmount = sippValue * 0.75;
        // Spread taxable over 20 years drawdown for annual income estimate
        const sippAnnualTaxableIncome = sippTaxableAmount / 20;
        // UK income tax on SIPP drawdown (simplified 2024/25 bands)
        function ukIncomeTax(income) {
          if (income <= 12570) return 0;
          if (income <= 50270) return (income - 12570) * 0.20;
          if (income <= 125140) return (50270 - 12570) * 0.20 + (income - 50270) * 0.40;
          return (50270 - 12570) * 0.20 + (125140 - 50270) * 0.40 + (income - 125140) * 0.45;
        }
        const sippAnnualTax = ukIncomeTax(sippAnnualTaxableIncome);

        const physicalAssets = plan.assetsLiabilities?.physicalAssets || [];
        const liabilities = plan.assetsLiabilities?.liabilities || [];
        const totalFinancialAssets = React.useMemo(() => sum(plan.accounts, 'value'), [plan.accounts]);
        const totalPhysicalAssets = React.useMemo(() => sum(physicalAssets, 'value'), [physicalAssets]);
        const totalLiabilities = React.useMemo(() => sum(liabilities, 'balance'), [liabilities]);
        const netWorth = totalFinancialAssets + totalPhysicalAssets - totalLiabilities;
        const monthlyLiabilityPayments = React.useMemo(() => sum(liabilities, 'monthlyPayment'), [liabilities]);
        const monthlyCashFlowAfterLiabilities = monthlyIncome - Number(plan.expenses.monthlyDrawdown || 0) - monthlyLiabilityPayments;
        const physicalCategoryColors = {
          Property: '#3b82f6',
          Vehicle: '#f59e0b',
          Personal: '#a855f7',
          Other: '#6b7280',
        };
        const physicalAllocationData = React.useMemo(() => {
          const grouped = { Property: 0, Vehicle: 0, Personal: 0, Other: 0 };
          physicalAssets.forEach((a) => {
            const cat = ['Property', 'Vehicle', 'Personal'].includes(a.category) ? a.category : 'Other';
            grouped[cat] += Number(a.value || 0);
          });
          return Object.entries(grouped)
            .filter(([, value]) => value > 0)
            .map(([name, value]) => ({ name, value }));
        }, [physicalAssets]);

        const currentAge = Number(plan.people.stuart.age || 46);
        const inflationRate = Number(plan.assumptions.inflation || 0) / 100;
        const realGrowth = (7 - Number(plan.assumptions.inflation || 0)) / 100;
        const baseAnnualDrawdown = Number(plan.expenses.monthlyDrawdown || 0) * 12;
        const isaStartValue = sum(plan.accounts.filter((a) => a.type === 'ISA'), 'value');
        const sippStartValue = sum(plan.accounts.filter((a) => a.type === 'SIPP'), 'value');

        const isaPhaseData = React.useMemo(() => {
          const rows = [];
          let isaBalance = Number(isaStartValue || 0);
          for (let age = 46; age <= 57; age += 1) {
            const yearsFromNow = age - currentAge;
            const inflationAdjustedExpense = baseAnnualDrawdown * Math.pow(1 + inflationRate, Math.max(0, yearsFromNow));
            const rentalIncome = sum(
              plan.incomeStreams
                .filter((s) => s.name.toLowerCase().includes('rental') && age >= Number(s.startAge) && age <= Number(s.endAge))
                .map((s) => Number(s.monthly || 0) * 12)
            );
            const netDraw = Math.max(0, inflationAdjustedExpense - rentalIncome);
            isaBalance = age === 46 ? isaBalance : Math.max(0, isaBalance * (1 + realGrowth) - netDraw);
            rows.push({
              age,
              isaBalance,
              netDraw,
              inflationAdjustedExpense,
            });
          }
          return rows;
        }, [isaStartValue, currentAge, baseAnnualDrawdown, inflationRate, plan.incomeStreams, realGrowth]);

        function grossFromNetRequired(netAmount) {
          if (netAmount <= 0) return 0;
          let low = netAmount;
          let high = netAmount * 2 + 50000;
          for (let i = 0; i < 30; i += 1) {
            const mid = (low + high) / 2;
            const net = mid - ukIncomeTax(mid);
            if (net >= netAmount) high = mid;
            else low = mid;
          }
          return high;
        }

        const sippPhaseData = React.useMemo(() => {
          const yearsTo57 = Math.max(0, 57 - currentAge);
          const sippAt57 = Number(sippStartValue || 0) * Math.pow(1 + realGrowth, yearsTo57);
          const pcls = sippAt57 * 0.25;
          let isaBalance = Number(isaPhaseData[isaPhaseData.length - 1]?.isaBalance || 0);
          let sippBalance = sippAt57 * 0.75;
          const rows = [];

          for (let age = 57; age <= Number(plan.people.lifeExpectancy || 90); age += 1) {
            if (age > 57) {
              isaBalance = Math.max(0, isaBalance * (1 + realGrowth));
              sippBalance = Math.max(0, sippBalance * (1 + realGrowth));
            }
            const yearsFromNow = age - currentAge;
            const annualExpense = baseAnnualDrawdown * Math.pow(1 + inflationRate, Math.max(0, yearsFromNow));
            const annualIncome = sum(
              plan.incomeStreams
                .filter((s) => age >= Number(s.startAge) && age <= Number(s.endAge))
                .map((s) => Number(s.monthly || 0) * 12)
            );
            const netNeed = Math.max(0, annualExpense - annualIncome);
            const totalBalance = isaBalance + sippBalance;
            const isaTargetDraw = totalBalance > 0 ? netNeed * (isaBalance / totalBalance) : 0;
            const isaDraw = Math.min(isaBalance, isaTargetDraw);
            isaBalance -= isaDraw;

            const remainingNeed = Math.max(0, netNeed - isaDraw);
            const sippGrossNeeded = grossFromNetRequired(remainingNeed);
            const sippDraw = Math.min(sippBalance, sippGrossNeeded);
            sippBalance -= sippDraw;
            const sippNet = Math.max(0, sippDraw - ukIncomeTax(sippDraw));

            const uncovered = Math.max(0, remainingNeed - sippNet);
            if (uncovered > 0 && isaBalance > 0) {
              const isaTopUp = Math.min(isaBalance, uncovered);
              isaBalance -= isaTopUp;

                          </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

                          {/* Total drawdown */}
                          <div className="rounded-xl p-4" style={{ background: 'var(--panel-2)', border: '1px solid var(--line)' }}>
                            <div className="text-xs muted uppercase tracking-wide mb-2">Total Retirement Drawdown</div>
                            <div className="flex items-center gap-2 mb-1">
                              <span className="text-lg font-bold text-positive">
                                {expMode === 'monthly' ? fmtMoney(monthly, 'GBP') : fmtMoney(yearly, 'GBP')}
                              </span>
                              <span className="muted text-xs">/{expMode === 'monthly' ? 'mo' : 'yr'}</span>
                            </div>
                            <input className="field rounded px-2 py-1 w-full text-sm mt-1" type="number"
                              value={expMode === 'monthly' ? monthly : yearly}
                              onChange={e => updatePlan(['expenses', 'monthlyDrawdown'],
                                expMode === 'monthly' ? Number(e.target.value) : Number(e.target.value) / 12)}
                            />
                            <div className="text-xs muted mt-2">
                              = {expMode === 'monthly' ? fmtMoney(yearly, 'GBP') + '/yr' : fmtMoney(monthly, 'GBP') + '/mo'}
                            </div>
                          </div>

                          {/* Inflation */}
                          <div className="rounded-xl p-4" style={{ background: 'var(--panel-2)', border: '1px solid var(--line)' }}>
                            <div className="text-xs muted uppercase tracking-wide mb-2">Inflation Assumption</div>
                            <div className="flex items-end gap-2 mb-2">
                              <span className="text-3xl font-bold" style={{ color: inflation >= 6 ? '#ef4444' : inflation >= 4 ? '#f59e0b' : '#22c55e' }}>
                                {inflation}%
                              </span>
                              <span className="muted text-xs mb-1">per year</span>
                            </div>
                            <input className="w-full accent-green-500" type="range" min="1" max="15" step="0.5"
                              value={inflation}
                              onChange={e => updatePlan(['assumptions', 'inflation'], Number(e.target.value))}
                            />
                            <div className="flex justify-between text-xs muted mt-1"><span>1%</span><span>15%</span></div>
                            <div className="mt-3 space-y-1 text-xs">
                              <div className="flex justify-between">
                                <span className="muted">Expenses in 10 yrs</span>
                                <span>{fmtMoney(monthly * Math.pow(1 + inflation/100, 10), 'GBP')}/mo</span>
                              </div>
                              <div className="flex justify-between">
                                <span className="muted">Expenses in 20 yrs</span>
                                <span>{fmtMoney(monthly * Math.pow(1 + inflation/100, 20), 'GBP')}/mo</span>
                              </div>
                              <div className="flex justify-between border-t pt-1 mt-1" style={{ borderColor: 'var(--line)' }}>
                                <span className="muted">Real portfolio return*</span>
                                <span className="text-amberish">nominal − {inflation}%</span>
                              </div>
                            </div>
                          </div>

                          {/* Expense categories */}
                          <div className="rounded-xl p-4" style={{ background: 'var(--panel-2)', border: '1px solid var(--line)' }}>
                            <div className="text-xs muted uppercase tracking-wide mb-2">Monthly Expense Categories</div>
                            <div className="space-y-1 max-h-52 overflow-y-auto pr-1">
                              {plan.expenses.categories.map(c => (
                                <div key={c.id} className="flex items-center gap-2">
                                  <span className="text-xs flex-1 muted">{c.name}</span>
                                  <div className="flex items-center gap-1">
                                    <span className="text-xs muted">£</span>
                                    <input className="field rounded px-1 py-0.5 text-xs w-20 text-right" type="number"
                                      value={expMode === 'monthly' ? c.monthly : Math.round(c.monthly * 12)}
                                      onChange={e => setPlan(prev => ({ ...prev, expenses: { ...prev.expenses,
                                        categories: prev.expenses.categories.map(x => x.id === c.id
                                          ? { ...x, monthly: expMode === 'monthly' ? Number(e.target.value) : Number(e.target.value) / 12 }
                                          : x)
                                      }}))}
                                    />
                                  </div>
                                </div>
                              ))}
                            </div>
                            <div className="border-t pt-2 mt-2 flex justify-between text-xs font-semibold" style={{ borderColor: 'var(--line)' }}>
                              <span>Total</span>
                              <span className="text-positive">
                                {expMode === 'monthly' ? fmtMoney(catTotal, 'GBP') + '/mo' : fmtMoney(catTotal * 12, 'GBP') + '/yr'}
                              </span>
                            </div>
                          </div>
                        </div>

                        {/* Impact banner */}
                        <div className="mt-4 rounded-lg p-3 text-xs grid grid-cols-2 md:grid-cols-4 gap-3"
                          style={{ background: 'rgba(34,197,94,0.07)', border: '1px solid rgba(34,197,94,0.2)' }}>
                          <div><div className="muted mb-0.5">Annual spend (today)</div><div className="font-semibold">{fmtMoney(yearly, 'GBP')}</div></div>
                          <div><div className="muted mb-0.5">Inflation-adj @ 10yrs</div><div className="font-semibold text-amberish">{fmtMoney(yearly * Math.pow(1 + inflation/100, 10), 'GBP')}</div></div>
                          <div><div className="muted mb-0.5">Inflation-adj @ 20yrs</div><div className="font-semibold text-negative">{fmtMoney(yearly * Math.pow(1 + inflation/100, 20), 'GBP')}</div></div>
                          <div><div className="muted mb-0.5">Portfolio devaluation/yr</div><div className="font-semibold text-negative">−{inflation}% real</div></div>
                        </div>
                        <div className="text-xs muted mt-2">* All projections use real returns (nominal CAGR minus this inflation rate). SA 5% default reflects ZAR purchasing power erosion.</div>
                      </div>
                    );
                  })()}

                  {/* ── PEOPLE & ASSUMPTIONS ── */}
                  <div className="panel rounded-xl p-4">
                    <div className="font-medium mb-3">People & Assumptions</div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                      <label>
                        <div className="muted">Stuart age</div>
                        <input className="field w-full rounded px-2 py-1" type="number" value={plan.people.stuart.age} onChange={(e) => updatePlan(['people', 'stuart', 'age'], Number(e.target.value))} />
                      </label>
                      <label>
                        <div className="muted">Nova age</div>
                        <input className="field w-full rounded px-2 py-1" type="number" value={plan.people.nova.age} onChange={(e) => updatePlan(['people', 'nova', 'age'], Number(e.target.value))} />
                      </label>
                      <label>
                        <div className="muted">Life expectancy</div>
                        <input className="field w-full rounded px-2 py-1" type="number" value={plan.people.lifeExpectancy} onChange={(e) => updatePlan(['people', 'lifeExpectancy'], Number(e.target.value))} />
                      </label>
                      <label>
                        <div className="muted">SA inflation % default</div>
                        <input className="field w-full rounded px-2 py-1" type="number" value={plan.assumptions.saInflation} onChange={(e) => updatePlan(['assumptions', 'saInflation'], Number(e.target.value))} />
                      </label>
                    </div>
                  </div>

                  <div className="panel rounded-xl p-4 overflow-auto">
                    <div className="font-medium mb-2">Accounts</div>
                    <table className="w-full text-xs md:text-sm">
                      <thead>
                        <tr className="border-b" style={{ borderColor: 'var(--line)' }}>
                          <th className="p-2 text-left">Name</th>
                          <th className="p-2 text-left">Type</th>
                          <th className="p-2 text-right">Value (£)</th>
                          <th className="p-2 text-right">Accessible age</th>
                        </tr>
                      </thead>
                      <tbody>
                        {plan.accounts.map((a) => (
                          <tr key={a.id} className="border-b" style={{ borderColor: 'var(--line)' }}>
                            <td className="p-2"><input className="field rounded px-2 py-1 w-full" value={a.name} onChange={(e) => setPlan((prev) => ({ ...prev, accounts: prev.accounts.map((x) => (x.id === a.id ? { ...x, name: e.target.value } : x)) }))} /></td>
                            <td className="p-2"><select className="select rounded px-2 py-1" value={a.type} onChange={(e) => setPlan((prev) => ({ ...prev, accounts: prev.accounts.map((x) => (x.id === a.id ? { ...x, type: e.target.value } : x)) }))}><option>ISA</option><option>SIPP</option><option>GIA</option><option>Crypto</option></select></td>
                            <td className="p-2"><input className="field rounded px-2 py-1 w-full text-right" type="number" value={a.value} onChange={(e) => setPlan((prev) => ({ ...prev, accounts: prev.accounts.map((x) => (x.id === a.id ? { ...x, value: Number(e.target.value) } : x)) }))} /></td>
                            <td className="p-2"><input className="field rounded px-2 py-1 w-full text-right" type="number" value={a.accessibleAge} onChange={(e) => setPlan((prev) => ({ ...prev, accounts: prev.accounts.map((x) => (x.id === a.id ? { ...x, accessibleAge: Number(e.target.value) } : x)) }))} /></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <button className="btn mt-2 px-3 py-1 rounded" onClick={() => setPlan((prev) => ({ ...prev, accounts: [...prev.accounts, { id: crypto.randomUUID(), name: 'New Account', value: 0, type: 'GIA', accessibleAge: prev.people.stuart.age }] }))}>Add Account</button>
                  </div>

                  <div className="panel rounded-xl p-4 overflow-auto">
                    <div className="font-medium mb-2">Income Streams</div>
                    <table className="w-full text-xs md:text-sm">
                      <thead>
                        <tr className="border-b" style={{ borderColor: 'var(--line)' }}>
                          <th className="p-2 text-left">Name</th>
                          <th className="p-2 text-right">Monthly (£)</th>
                          <th className="p-2 text-right">Start Age</th>
                          <th className="p-2 text-right">End Age</th>
                          <th className="p-2 text-center">Taxable</th>
                        </tr>
                      </thead>
                      <tbody>
                        {plan.incomeStreams.map((i) => (
                          <tr key={i.id} className="border-b" style={{ borderColor: 'var(--line)' }}>
                            <td className="p-2"><input className="field rounded px-2 py-1 w-full" value={i.name} onChange={(e) => setPlan((prev) => ({ ...prev, incomeStreams: prev.incomeStreams.map((x) => (x.id === i.id ? { ...x, name: e.target.value } : x)) }))} /></td>
                            <td className="p-2"><input className="field rounded px-2 py-1 w-full text-right" type="number" value={i.monthly} onChange={(e) => setPlan((prev) => ({ ...prev, incomeStreams: prev.incomeStreams.map((x) => (x.id === i.id ? { ...x, monthly: Number(e.target.value) } : x)) }))} /></td>
                            <td className="p-2"><input className="field rounded px-2 py-1 w-full text-right" type="number" value={i.startAge} onChange={(e) => setPlan((prev) => ({ ...prev, incomeStreams: prev.incomeStreams.map((x) => (x.id === i.id ? { ...x, startAge: Number(e.target.value) } : x)) }))} /></td>
                            <td className="p-2"><input className="field rounded px-2 py-1 w-full text-right" type="number" value={i.endAge} onChange={(e) => setPlan((prev) => ({ ...prev, incomeStreams: prev.incomeStreams.map((x) => (x.id === i.id ? { ...x, endAge: Number(e.target.value) } : x)) }))} /></td>
                            <td className="p-2 text-center"><input type="checkbox" checked={i.taxable} onChange={(e) => setPlan((prev) => ({ ...prev, incomeStreams: prev.incomeStreams.map((x) => (x.id === i.id ? { ...x, taxable: e.target.checked } : x)) }))} /></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <button className="btn mt-2 px-3 py-1 rounded" onClick={() => setPlan((prev) => ({ ...prev, incomeStreams: [...prev.incomeStreams, { id: crypto.randomUUID(), name: 'Additional income', monthly: 0, startAge: prev.people.stuart.age, endAge: prev.people.lifeExpectancy, taxable: true }] }))}>Add Income Row</button>
                  </div>

                  <div className="panel rounded-xl p-4">
                    <div className="font-medium mb-2">Expenses & Scenario Snapshots</div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <label>
                        <div className="muted">Monthly drawdown (£)</div>
                        <input className="field w-full rounded px-2 py-1" type="number" value={plan.expenses.monthlyDrawdown} onChange={(e) => updatePlan(['expenses', 'monthlyDrawdown'], Number(e.target.value))} />
                      </label>
                      <div>
                        <div className="muted mb-1">Save / load named plans</div>
                        <div className="flex gap-2">
                          <input className="field rounded px-2 py-1 flex-1" value={newSaveName} onChange={(e) => setNewSaveName(e.target.value)} placeholder="Name" />
                          <button className="btn px-3 py-1 rounded" onClick={saveNamedScenario}>Save</button>
                        </div>
                        <div className="mt-2 flex flex-wrap gap-2">
                          {Object.keys(savedPlans).map((name) => (
                            <button key={name} className="btn px-2 py-1 rounded text-xs" onClick={() => loadNamedScenario(name)}>{name}</button>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="panel rounded-xl p-4 overflow-auto">
                    <div className="font-medium mb-2">Expense Categories</div>
                    <table className="w-full text-xs md:text-sm">
                      <thead>
                        <tr className="border-b" style={{ borderColor: 'var(--line)' }}>
                          <th className="p-2 text-left">Category</th>
                          <th className="p-2 text-right">Monthly (£)</th>
                        </tr>
                      </thead>
                      <tbody>
                        {plan.expenses.categories.map((c) => (
                          <tr key={c.id} className="border-b" style={{ borderColor: 'var(--line)' }}>
                            <td className="p-2">
                              <input
                                className="field rounded px-2 py-1 w-full"
                                value={c.name}
                                onChange={(e) =>
                                  setPlan((prev) => ({
                                    ...prev,
                                    expenses: {
                                      ...prev.expenses,
                                      categories: prev.expenses.categories.map((x) => (x.id === c.id ? { ...x, name: e.target.value } : x)),
                                    },
                                  }))
                                }
                              />
                            </td>
                            <td className="p-2">
                              <input
                                className="field rounded px-2 py-1 w-full text-right"
                                type="number"
                                value={c.monthly}
                                onChange={(e) =>
                                  setPlan((prev) => ({
                                    ...prev,
                                    expenses: {
                                      ...prev.expenses,
                                      categories: prev.expenses.categories.map((x) => (x.id === c.id ? { ...x, monthly: Number(e.target.value) } : x)),
                                    },
                                  }))
                                }
                              />
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <button
                      className="btn mt-2 px-3 py-1 rounded"
                      onClick={() =>
                        setPlan((prev) => ({
                          ...prev,
                          expenses: {
                            ...prev.expenses,
                            categories: [...prev.expenses.categories, { id: crypto.randomUUID(), name: 'New Category', monthly: 0 }],
                          },
                        }))
                      }
                    >
                      Add Category
                    </button>
                  </div>

                  <div className="panel rounded-xl p-4 overflow-auto">
                    <div className="font-medium mb-2">One-Off Expenses</div>
                    <table className="w-full text-xs md:text-sm">
                      <thead>
                        <tr className="border-b" style={{ borderColor: 'var(--line)' }}>
                          <th className="p-2 text-left">Name</th>
                          <th className="p-2 text-right">Amount (£)</th>
                          <th className="p-2 text-right">Date</th>
                        </tr>
                      </thead>
                      <tbody>
                        {plan.expenses.oneOffs.map((o) => (
                          <tr key={o.id} className="border-b" style={{ borderColor: 'var(--line)' }}>
                            <td className="p-2">
                              <input
                                className="field rounded px-2 py-1 w-full"
                                value={o.name}
                                onChange={(e) =>
                                  setPlan((prev) => ({
                                    ...prev,
                                    expenses: {
                                      ...prev.expenses,
                                      oneOffs: prev.expenses.oneOffs.map((x) => (x.id === o.id ? { ...x, name: e.target.value } : x)),
                                    },
                                  }))
                                }
                              />
                            </td>
                            <td className="p-2">
                              <input
                                className="field rounded px-2 py-1 w-full text-right"
                                type="number"
                                value={o.amount}
                                onChange={(e) =>
                                  setPlan((prev) => ({
                                    ...prev,
                                    expenses: {
                                      ...prev.expenses,
                                      oneOffs: prev.expenses.oneOffs.map((x) => (x.id === o.id ? { ...x, amount: Number(e.target.value) } : x)),
                                    },
                                  }))
                                }
                              />
                            </td>
                            <td className="p-2">
                              <input
                                className="field rounded px-2 py-1 w-full text-right"
                                type="date"
                                value={o.date}
                                onChange={(e) =>
                                  setPlan((prev) => ({
                                    ...prev,
                                    expenses: {
                                      ...prev.expenses,
                                      oneOffs: prev.expenses.oneOffs.map((x) => (x.id === o.id ? { ...x, date: e.target.value } : x)),
                                    },
                                  }))
                                }
                              />
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <button
                      className="btn mt-2 px-3 py-1 rounded"
                      onClick={() =>
                        setPlan((prev) => ({
                          ...prev,
                          expenses: {
                            ...prev.expenses,
                            oneOffs: [...prev.expenses.oneOffs, { id: crypto.randomUUID(), name: 'One-off', amount: 0, date: `${CURRENT_YEAR}-01-01` }],
                          },
                        }))
                      }
                    >
                      Add One-Off
                    </button>
                  </div>

                  <div className="panel rounded-xl p-4 overflow-auto">
                    <div className="font-medium mb-2">Key Holdings</div>
                    <table className="w-full text-xs md:text-sm">
                      <thead>
                        <tr className="border-b" style={{ borderColor: 'var(--line)' }}>
                          <th className="p-2 text-left">Name</th>
                          <th className="p-2 text-right">Quantity</th>
                          <th className="p-2 text-right">Avg Buy</th>
                          <th className="p-2 text-right">Current</th>
                          <th className="p-2 text-right">CAGR %</th>
                        </tr>
                      </thead>
                      <tbody>
                        {plan.holdings.map((h) => (
                          <tr key={h.id} className="border-b" style={{ borderColor: 'var(--line)' }}>
                            <td className="p-2">
                              <input
                                className="field rounded px-2 py-1 w-full"
                                value={h.name}
                                onChange={(e) =>
                                  setPlan((prev) => ({ ...prev, holdings: prev.holdings.map((x) => (x.id === h.id ? { ...x, name: e.target.value } : x)) }))
                                }
                              />
                            </td>
                            <td className="p-2">
                              <input
                                className="field rounded px-2 py-1 w-full text-right"
                                type="number"
                                value={h.quantity}
                                onChange={(e) =>
                                  setPlan((prev) => ({ ...prev, holdings: prev.holdings.map((x) => (x.id === h.id ? { ...x, quantity: Number(e.target.value) } : x)) }))
                                }
                              />
                            </td>
                            <td className="p-2">
                              <input
                                className="field rounded px-2 py-1 w-full text-right"
                                type="number"
                                value={h.avgBuy}
                                onChange={(e) =>
                                  setPlan((prev) => ({ ...prev, holdings: prev.holdings.map((x) => (x.id === h.id ? { ...x, avgBuy: Number(e.target.value) } : x)) }))
                                }
                              />
                            </td>
                            <td className="p-2">
                              <input
                                className="field rounded px-2 py-1 w-full text-right"
                                type="number"
                                value={h.current}
                                onChange={(e) =>
                                  setPlan((prev) => ({ ...prev, holdings: prev.holdings.map((x) => (x.id === h.id ? { ...x, current: Number(e.target.value) } : x)) }))
                                }
                              />
                            </td>
                            <td className="p-2">
                              <input
                                className="field rounded px-2 py-1 w-full text-right"
                                type="number"
                                value={h.cagr}
                                onChange={(e) =>
                                  setPlan((prev) => ({ ...prev, holdings: prev.holdings.map((x) => (x.id === h.id ? { ...x, cagr: Number(e.target.value) } : x)) }))
                                }
                              />
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <button
                      className="btn mt-2 px-3 py-1 rounded"
                      onClick={() =>
                        setPlan((prev) => ({
                          ...prev,
                          holdings: [...prev.holdings, { id: crypto.randomUUID(), name: 'New Holding', quantity: 0, avgBuy: 0, current: 0, cagr: 8 }],
                        }))
                      }
                    >
                      Add Holding
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
